name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'protocols/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'protocols/**'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  CROSS_REPO_READ_TOKEN: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cross-repo token
        run: |
          if [ -z "${CROSS_REPO_READ_TOKEN}" ]; then
            echo "Missing secret WATTETHERIA_CI_REPO_TOKEN for private sibling repository checkout." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-did
          path: deps/watt-did
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-wallet
          path: deps/watt-wallet
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/wattswarm
          path: deps/wattswarm
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - run: |
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-did" "$GITHUB_WORKSPACE/../watt-did"
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-wallet" "$GITHUB_WORKSPACE/../watt-wallet"
          ln -sfn "$GITHUB_WORKSPACE/deps/wattswarm" "$GITHUB_WORKSPACE/../wattswarm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cross-repo token
        run: |
          if [ -z "${CROSS_REPO_READ_TOKEN}" ]; then
            echo "Missing secret WATTETHERIA_CI_REPO_TOKEN for private sibling repository checkout." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-did
          path: deps/watt-did
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-wallet
          path: deps/watt-wallet
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/wattswarm
          path: deps/wattswarm
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - run: |
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-did" "$GITHUB_WORKSPACE/../watt-did"
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-wallet" "$GITHUB_WORKSPACE/../watt-wallet"
          ln -sfn "$GITHUB_WORKSPACE/deps/wattswarm" "$GITHUB_WORKSPACE/../wattswarm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cross-repo token
        run: |
          if [ -z "${CROSS_REPO_READ_TOKEN}" ]; then
            echo "Missing secret WATTETHERIA_CI_REPO_TOKEN for private sibling repository checkout." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-did
          path: deps/watt-did
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-wallet
          path: deps/watt-wallet
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/wattswarm
          path: deps/wattswarm
          token: ${{ secrets.WATTETHERIA_CI_REPO_TOKEN }}
      - run: |
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-did" "$GITHUB_WORKSPACE/../watt-did"
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-wallet" "$GITHUB_WORKSPACE/../watt-wallet"
          ln -sfn "$GITHUB_WORKSPACE/deps/wattswarm" "$GITHUB_WORKSPACE/../wattswarm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
