name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'protocols/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'protocols/**'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-did
          path: deps/watt-did
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-wallet
          path: deps/watt-wallet
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/wattswarm
          path: deps/wattswarm
      - run: |
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-did" "$GITHUB_WORKSPACE/../watt-did"
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-wallet" "$GITHUB_WORKSPACE/../watt-wallet"
          ln -sfn "$GITHUB_WORKSPACE/deps/wattswarm" "$GITHUB_WORKSPACE/../wattswarm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-did
          path: deps/watt-did
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-wallet
          path: deps/watt-wallet
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/wattswarm
          path: deps/wattswarm
      - run: |
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-did" "$GITHUB_WORKSPACE/../watt-did"
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-wallet" "$GITHUB_WORKSPACE/../watt-wallet"
          ln -sfn "$GITHUB_WORKSPACE/deps/wattswarm" "$GITHUB_WORKSPACE/../wattswarm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-did
          path: deps/watt-did
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/watt-wallet
          path: deps/watt-wallet
      - uses: actions/checkout@v4
        with:
          repository: wattetheria/wattswarm
          path: deps/wattswarm
      - run: |
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-did" "$GITHUB_WORKSPACE/../watt-did"
          ln -sfn "$GITHUB_WORKSPACE/deps/watt-wallet" "$GITHUB_WORKSPACE/../watt-wallet"
          ln -sfn "$GITHUB_WORKSPACE/deps/wattswarm" "$GITHUB_WORKSPACE/../wattswarm"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
