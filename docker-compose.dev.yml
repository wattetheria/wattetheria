# Development overlay with hot reload via cargo watch.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  kernel:
    build:
      target: dev
    volumes:
      - .:/app
      - ../watt-did:/watt-did:ro
      - ../watt-wallet:/watt-wallet:ro
      - ../wattswarm:/wattswarm:ro
      - wattetheria_cargo_target:/app/target
      - wattetheria_cargo_registry:/usr/local/cargo/registry
      - wattetheria_state:/var/lib/wattetheria
    healthcheck:
      start_period: 180s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        exec cargo watch
        --poll
        --watch Cargo.toml
        --watch Cargo.lock
        --watch apps
        --watch crates
        --ignore target
        --shell 'set -a; [ -f /var/lib/wattetheria/deploy/.env ] && . /var/lib/wattetheria/deploy/.env; set +a; set -- --data-dir /var/lib/wattetheria --control-plane-bind 0.0.0.0:7777; [ -n "$${WATTETHERIA_BRAIN_PROVIDER_KIND:-}" ] && set -- "$$@" --brain-provider-kind "$$WATTETHERIA_BRAIN_PROVIDER_KIND"; [ -n "$${WATTETHERIA_BRAIN_BASE_URL:-}" ] && set -- "$$@" --brain-base-url "$$WATTETHERIA_BRAIN_BASE_URL"; [ -n "$${WATTETHERIA_BRAIN_MODEL:-}" ] && set -- "$$@" --brain-model "$$WATTETHERIA_BRAIN_MODEL"; [ -n "$${WATTETHERIA_BRAIN_API_KEY_ENV:-}" ] && set -- "$$@" --brain-api-key-env "$$WATTETHERIA_BRAIN_API_KEY_ENV"; [ -n "$${WATTETHERIA_WATTSWARM_UI_BASE_URL:-}" ] && set -- "$$@" --wattswarm-ui-base-url "$$WATTETHERIA_WATTSWARM_UI_BASE_URL"; [ -n "$${WATTETHERIA_WATTSWARM_SYNC_GRPC_ENDPOINT:-}" ] && set -- "$$@" --wattswarm-sync-grpc-endpoint "$$WATTETHERIA_WATTSWARM_SYNC_GRPC_ENDPOINT"; exec cargo run -p wattetheria-kernel -- "$$@"'

volumes:
  wattetheria_cargo_target:
  wattetheria_cargo_registry:
