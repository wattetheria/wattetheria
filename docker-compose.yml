services:
  kernel:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - github_token
    container_name: wattetheria-kernel
    restart: unless-stopped
    environment:
      WATTETHERIA_DATA_DIR: /var/lib/wattetheria
      WATTETHERIA_CONTROL_PLANE_BIND: 0.0.0.0:7777
    volumes:
      - wattetheria_state:/var/lib/wattetheria
    ports:
      - "${WATTETHERIA_CONTROL_PLANE_PORT:-7777}:7777"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7777/supervision >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    entrypoint: ["/app/scripts/docker-kernel-entrypoint.sh"]

  observatory:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - github_token
    container_name: wattetheria-observatory
    restart: unless-stopped
    depends_on:
      - kernel
    environment:
      PORT: 8787
    ports:
      - "${WATTETHERIA_OBSERVATORY_PORT:-8780}:8787"
    entrypoint: ["/app/scripts/docker-observatory-entrypoint.sh"]

volumes:
  wattetheria_state:

secrets:
  github_token:
    environment: GITHUB_TOKEN
