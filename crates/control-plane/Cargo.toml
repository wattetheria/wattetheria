[dev-dependencies]
async-trait.workspace = true
tempfile.workspace = true
http-body-util = "0.1"
wattswarm-protocol = { git = "https://github.com/wattetheria/wattswarm.git", rev = "9965eea30b88b4ebb16a4e6a855f4d37ecb70284", package = "wattswarm-protocol" }
